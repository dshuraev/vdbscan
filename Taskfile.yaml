version: "3"

vars:
  BIN: vdbscan
  STABLE_TOOLCHAIN: 1.89.0-x86_64-unknown-linux-gnu
  NIGHTLY_TOOLCHAIN: nightly-2025-10-31-x86_64-unknown-linux-gnu
  REPORTS_DIR: reports
  RELEASE_DIR: dist
  TASK_CACHE_DIR: .task-cache
  DENY_CARGO_HOME: "{{.TASK_CACHE_DIR}}/cargo-home"
  DENY_CARGO_DENY_HOME: "{{.TASK_CACHE_DIR}}/cargo-deny"
  BUILD_TARGETS:
    - x86_64-unknown-linux-gnu
    - aarch64-unknown-linux-gnu
  FUZZ_TARGETS:
    - fuzz_voxel_no_panic
    - fuzz_dbscan_no_panic
    - fuzz_dbscan_invariants
    - fuzz_label_noise_consistency
  # Fixed run budget used by fuzz — override with: task fuzz CI_FUZZ_RUNS=500000
  CI_FUZZ_RUNS: "200000"
  CI_FUZZ_TIMEOUT: "10"
  CI_FUZZ_MAX_LEN: "4096"

tasks:
  # ---------------------------------------------------------------------------
  # Toolchain setup
  # ---------------------------------------------------------------------------
  rust:components:stable:
    desc: Install stable Rust components used by tasks
    env:
      RUSTUP_TOOLCHAIN: "{{.STABLE_TOOLCHAIN}}"
    cmds:
      - rustup component add --toolchain {{.STABLE_TOOLCHAIN}} rustfmt clippy llvm-tools-preview

  rust:components:nightly:
    desc: Install nightly Rust components used by tasks
    env:
      RUSTUP_TOOLCHAIN: "{{.NIGHTLY_TOOLCHAIN}}"
    cmds:
      - rustup component add --toolchain {{.NIGHTLY_TOOLCHAIN}} miri rust-src

  # ---------------------------------------------------------------------------
  # Default (fast local loop)
  # ---------------------------------------------------------------------------
  default:
    desc: Format check, clippy, native debug build
    cmds:
      - task: format
      - task: clippy
      - task: build

  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------
  build:
    desc: Debug build (native)
    cmds:
      - cargo +{{.STABLE_TOOLCHAIN}} build --locked

  build:all:
    desc: Debug build for all targets
    cmds:
      - for: { var: BUILD_TARGETS }
        cmd: cargo +{{.STABLE_TOOLCHAIN}} build --locked --target {{.ITEM}}

  build:release:
    desc: Release build (native)
    cmds:
      - cargo +{{.STABLE_TOOLCHAIN}} build --release --locked

  build:release:all:
    desc: Release build for all targets
    cmds:
      - for: { var: BUILD_TARGETS }
        cmd: cargo +{{.STABLE_TOOLCHAIN}} build --release --locked --target {{.ITEM}}

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean
      - rm -rf {{.TASK_CACHE_DIR}}

  # ---------------------------------------------------------------------------
  # Lint & format
  # ---------------------------------------------------------------------------
  format:
    desc: Verify Rust formatting
    cmds:
      - task: rust:components:stable
      - cargo +{{.STABLE_TOOLCHAIN}} fmt --all --check

  clippy:
    desc: Run clippy with warnings denied
    cmds:
      - task: rust:components:stable
      - cargo +{{.STABLE_TOOLCHAIN}} clippy --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------------------
  test:
    desc: Run tests (native)
    cmds:
      - RUSTFLAGS="-C overflow-checks=on" cargo +{{.STABLE_TOOLCHAIN}} test --all-targets --locked

  test:cross:
    desc: Run tests on aarch64 via cross (requires Docker)
    cmds:
      - RUSTFLAGS="-C overflow-checks=on" cross test --target aarch64-unknown-linux-gnu --all-targets --locked

  # ---------------------------------------------------------------------------
  # Security & supply-chain
  # ---------------------------------------------------------------------------
  audit:
    desc: Audit dependencies for known vulnerabilities
    cmds:
      - cargo +{{.STABLE_TOOLCHAIN}} audit

  deny:
    desc: Run cargo-deny checks
    cmds:
      - mkdir -p {{.DENY_CARGO_HOME}} {{.DENY_CARGO_DENY_HOME}}
      - CARGO_HOME={{.DENY_CARGO_HOME}} CARGO_DENY_HOME={{.DENY_CARGO_DENY_HOME}} cargo +{{.STABLE_TOOLCHAIN}} deny check

  # ---------------------------------------------------------------------------
  # Fuzz
  # ---------------------------------------------------------------------------
  fuzz:
    desc: Fuzz all targets with a fixed run budget (CI)
    run: always
    env:
      RUST_BACKTRACE: "1"
    vars:
      SANITIZER: address
      RSS_LIMIT_MB: 4096
      USE_VALUE_PROFILE: 1
      EXTRA_FLAGS: "-print_final_stats=1"
    cmds:
      - for: { var: FUZZ_TARGETS }
        cmd: >
          cargo +{{.NIGHTLY_TOOLCHAIN}} fuzz run {{.ITEM}}
          --sanitizer {{.SANITIZER}} --
          -runs={{.CI_FUZZ_RUNS}}
          -max_len={{.CI_FUZZ_MAX_LEN}}
          -timeout={{.CI_FUZZ_TIMEOUT}}
          -rss_limit_mb={{.RSS_LIMIT_MB}}
          -use_value_profile={{.USE_VALUE_PROFILE}}
          {{.EXTRA_FLAGS}}

  # ---------------------------------------------------------------------------
  # Analysis & reporting
  # ---------------------------------------------------------------------------
  coverage:
    desc: Generate coverage reports (text, lcov, html)
    cmds:
      - task: rust:components:stable
      - mkdir -p {{.REPORTS_DIR}}/coverage-html
      - cargo +{{.STABLE_TOOLCHAIN}} llvm-cov --text --ignore-filename-regex '/test/' | tee {{.REPORTS_DIR}}/coverage.txt
      - cargo +{{.STABLE_TOOLCHAIN}} llvm-cov --lcov --ignore-filename-regex '/test/' --output-path {{.REPORTS_DIR}}/coverage.lcov
      - cargo +{{.STABLE_TOOLCHAIN}} llvm-cov --html --ignore-filename-regex '/test/' --output-dir {{.REPORTS_DIR}}/coverage-html

  geiger:
    desc: Report unsafe Rust usage (informational)
    cmds:
      - mkdir -p {{.REPORTS_DIR}}
      - cargo +{{.STABLE_TOOLCHAIN}} geiger | tee {{.REPORTS_DIR}}/geiger.txt || true

  miri:
    desc: Run tests under Miri (UB detection)
    cmds:
      - task: rust:components:nightly
      - RUSTFLAGS="-C overflow-checks=on" cargo +{{.NIGHTLY_TOOLCHAIN}} miri test

  coupling:
    desc: Run coupling checks
    cmds:
      - mkdir -p {{.REPORTS_DIR}}
      - cargo +{{.STABLE_TOOLCHAIN}} coupling | tee {{.REPORTS_DIR}}/coupling.md

  bloat:
    desc: Report release binary size contributors (informational)
    cmds:
      - mkdir -p {{.REPORTS_DIR}}
      - cargo +{{.STABLE_TOOLCHAIN}} bloat --release --crates | tee {{.REPORTS_DIR}}/bloat.txt || true

  auditable:
    desc: Build auditable release artifacts for all targets
    cmds:
      - mkdir -p {{.RELEASE_DIR}}
      - for: { var: BUILD_TARGETS }
        cmd: cargo +{{.STABLE_TOOLCHAIN}} auditable build --release --locked --target {{.ITEM}}
      - for: { var: BUILD_TARGETS }
        cmd: cp target/{{.ITEM}}/release/{{.BIN}} {{.RELEASE_DIR}}/{{.BIN}}-{{.ITEM}}

  # ---------------------------------------------------------------------------
  # CI gates
  # ---------------------------------------------------------------------------
  ci:
    desc: Full CI gate — lint, test (native + cross), deny, build all targets
    cmds:
      - task: format
      - task: clippy
      - task: test
      - task: test:cross
      - task: deny
      - task: build:all
      - task: build:release:all

  release:
    desc: CI gate + audit + auditable artifacts
    cmds:
      - task: ci
      - task: audit
      - task: auditable

  # Full suite including slow/heavyweight checks — typically run pre-merge or nightly
  check:
    desc: Run all configured checks including heavyweight analysis
    cmds:
      - task: ci
      - task: audit
      - task: geiger
      - task: miri
      - task: fuzz
      - task: coupling
      - task: bloat
      - task: coverage
