[graph]
# No targets specified; check all platforms.

[advisories]
# Deny crates with known security vulnerabilities.
version = 2
ignore = []

[licenses]
version = 2
# Allow common permissive licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
# Confidence threshold for license expression detection.
confidence-threshold = 0.8

[bans]
# Deny duplicate versions of the same crate by default (warn is also fine).
multiple-versions = "warn"
# Deny wildcard dependencies.
wildcards = "deny"

[sources]
# Only allow crates from crates.io.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
